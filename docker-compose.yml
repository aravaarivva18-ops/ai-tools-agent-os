services:
  # Local database for agent memory and RAG vectors
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_tools_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ai_tools_memory}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/postgresql
      - /tmp


  # Main application container running scrapers and tasks
  app:
    build: .
    container_name: ai_tools_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://rus:changeme@db:5432/ai_tools_memory}
      - OBSIDIAN_VAULT_PATH=${OBSIDIAN_VAULT_PATH:-/app/vault}
    volumes:
      # Mount workspace code for live reloading during development
      - .:/app
      # Mount Obsidian Vault directory from local host machine
      # User can specify their actual Obsidian Vault folder path on macOS host
      - ./vault:/app/vault

volumes:
  pgdata:
