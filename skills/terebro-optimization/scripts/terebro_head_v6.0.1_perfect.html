  function buildCookieStringWithYclid() {
    var cookieString = '';
    try { cookieString = document.cookie || ''; } catch(e) {}
    var y = getYclidValue();
    if (y) {
      var enc = encodeURIComponent(y);
      if (cookieString.indexOf('_em_yclid=') === -1) {

      if (cookieString.indexOf('yclid=') === -1) {

    if (y) {
      yclidFieldAliases.forEach(function(name) {
        document.querySelectorAll('input[name="' + name + '"], textarea[name="' + name + '"]').forEach(function (el) { el.value = y; });

            if (display !== 'none') {

      }
    });

      attributes: true,
      attributeFilter: ['style'],
